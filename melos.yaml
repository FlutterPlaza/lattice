name: lattice
repository: https://github.com/flutterplaza/lattice

packages:
  - packages/*
  - tools/*

command:
  bootstrap:
    usePubspecOverrides: true

scripts:
  analyze:
    run: dart analyze --fatal-infos
    exec:
      concurrency: 4
    description: Run dart analyze in all packages

  format:
    run: dart format --set-exit-if-changed .
    description: Check formatting in all packages

  test:
    run: dart test
    exec:
      concurrency: 4
    packageFilters:
      dirExists: test
    description: Run tests in all packages

  test:ci:
    run: dart test --reporter=github
    exec:
      concurrency: 1
    packageFilters:
      dirExists: test
    description: Run tests in CI mode
